<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LU ❤️</title>
<link rel="shortcut icon" href="https://xatimg.com/image/5AgY5huKquKQ.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Reset y Fondo */
* { box-sizing: border-box; }
body, html {
    margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    display: flex; justify-content: center; align-items: center;
    font-family: 'Arial', sans-serif;
    position: relative;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Lluvia de fondo CONSTANTE */
.heart-bg {
    position: absolute; color: #fff; font-size: 20px;
    user-select: none; z-index: 5;
    animation: fallPage 7s infinite linear;
    text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
    top: -10%;
}

@keyframes fallPage {
    0% { transform: translateY(0vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(115vh) rotate(360deg); opacity: 1; }
}

/* --- MONTAÑA TIPO NIEVE (DUNA CENTRAL) --- */
.snow-pile {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 100px;
    z-index: 20;
    pointer-events: none;
    background: linear-gradient(to top, rgba(255, 255, 255, 0.8) 0%, transparent 100%);
}

.snow-heart {
    position: absolute;
    color: #fff;
    text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
    bottom: -10px;
}

/* --- CUADRO PRINCIPAL (700x500) --- */
.main-card {
    position: relative;
    width: 90vw; max-width: 700px;
    height: 85vh; max-height: 500px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 40px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 20px; overflow: hidden;
    z-index: 10; margin-top: -30px;
}

/* Corazones internos cayendo */
.heart-inner {
    position: absolute; color: #ff1493; font-size: 20px;
    z-index: 2; animation: fallInner 6s infinite linear;
}

@keyframes fallInner {
    0% { transform: translateY(-350px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(350px) rotate(360deg); opacity: 0; }
}

/* Contenido */
.content {
    position: relative; z-index: 30; width: 100%;
    display: flex; flex-direction: column; align-items: center;
}

/* EFECTO BROTE EN LU */
.title-container { position: relative; display: inline-block; }

h1 {
    font-size: clamp(3.5rem, 15vw, 5.5rem);
    color: #fff; margin: 0 0 15px 0;
    text-transform: uppercase;
    text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
    letter-spacing: 10px;
    position: relative; z-index: 5;
}

.sprout-heart {
    position: absolute;
    color: #ffb7c5;
    font-size: 20px;
    z-index: 1;
    animation: sprout 3s infinite ease-out;
    opacity: 0;
}

@keyframes sprout {
    0% { transform: scale(0) translate(0, 0); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.5) translate(var(--x), var(--y)); opacity: 0; }
}

/* Video Responsivo */
.video-wrap {
    width: 100%; max-width: 500px;
    aspect-ratio: 16 / 9;
    border-radius: 20px; overflow: hidden;
    border: 4px solid #fff;
    box-shadow: 0 0 40px 15px rgba(255, 20, 147, 0.9);
}

iframe { width: 100%; height: 100%; border: none; }

</style>
</head>
<body>

<div class="heart-bg" style="left:5%; animation-delay:0s;">&#10084;</div>
<div class="heart-bg" style="left:15%; animation-delay:2s;">&#10084;</div>
<div class="heart-bg" style="left:25%; animation-delay:4s;">&#10084;</div>
<div class="heart-bg" style="left:35%; animation-delay:1s;">&#10084;</div>
<div class="heart-bg" style="left:45%; animation-delay:5s;">&#10084;</div>
<div class="heart-bg" style="left:55%; animation-delay:3s;">&#10084;</div>
<div class="heart-bg" style="left:65%; animation-delay:6s;">&#10084;</div>
<div class="heart-bg" style="left:75%; animation-delay:2s;">&#10084;</div>
<div class="heart-bg" style="left:85%; animation-delay:4s;">&#10084;</div>
<div class="heart-bg" style="left:95%; animation-delay:1s;">&#10084;</div>

<div class="snow-pile">
    <div class="snow-heart" style="left:5%; font-size: 40px;">&#10084;</div>
    <div class="snow-heart" style="left:20%; font-size: 45px;">&#10084;</div>
    <div class="snow-heart" style="left:50%; transform: translateX(-50%); font-size: 80px; bottom: -20px;">&#10084;</div>
    <div class="snow-heart" style="left:80%; font-size: 45px;">&#10084;</div>
    <div class="snow-heart" style="left:92%; font-size: 40px;">&#10084;</div>
</div>

<div class="main-card">
    <div class="heart-inner" style="left:10%; animation-duration:5s;">&#10084;</div>
    <div class="heart-inner" style="left:40%; animation-delay:2s;">&#10084;</div>
    <div class="heart-inner" style="left:70%; animation-delay:4s;">&#10084;</div>

    <div class="content">
        <div class="title-container">
            <h1>LU</h1>
            <div class="sprout-heart" style="--x: -40px; --y: -40px; left: 10%; top: 20%;">&#10084;</div>
            <div class="sprout-heart" style="--x: 40px; --y: -50px; left: 60%; top: 10%; animation-delay: 1s;">&#10084;</div>
            <div class="sprout-heart" style="--x: 0px; --y: -60px; left: 40%; top: 0%; animation-delay: 0.5s;">&#10084;</div>
        </div>
        <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/WvMClfhShJE?si=jdlkAbjIe-MnpbFX&autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>
</div>

</body>
</html>
