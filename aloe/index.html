<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALOE XatSpace</title>
    <link rel="SHORTCUT ICON" href="https://xatimg.com/image/K0omsEWnsHvq.gif">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@1,600&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: #1a0a1a;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
        }

        .bg-photos {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background-image: url('https://xatimg.com/image/aiJ20X8LT75e.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            pointer-events: none;
        }

        @media (max-width: 500px) or (orientation: portrait) {
            .bg-photos {
                background-image: url('https://xatimg.com/image/pU2VUMInUvTj.jpg');
                background-position: center center;
            }
        }

        .heart-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
            animation: fall linear infinite;
            opacity: 0;
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { top: 100%; transform: translateX(50px) rotate(360deg); opacity: 0; }
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 45px 30px 25px; 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 440px;
            width: 95%;
            position: relative;
            z-index: 10;
            margin-bottom: 60px; 
            min-height: 350px;
            transition: all 0.3s ease;
        }

        /* --- ICONOS EN LAS ESQUINAS (FIJOS) --- */
        .corner-btn {
            position: absolute;
            top: 25px;
            font-size: 20px;
            color: #ffb7c5;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 20;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        .corner-btn:hover { transform: scale(1.2); color: #fff; text-shadow: 0 0 15px #ffb7c5; }
        
        #btn-music { left: 25px; }
        #btn-back { right: 25px; }

        /* --- CABECERA CENTRADA (RECUPERADO) --- */
        .header-flex {
            display: flex;
            align-items: center;
            justify-content: center; /* Centrado total */
            gap: 20px;
            margin-bottom: 25px;
            width: 100%;
        }

        /* TAMAÑO ORIGINAL DEL GIF (120x120) */
        .avatar-wrapper {
            position: relative;
            width: 120px; 
            height: 120px;
            flex-shrink: 0;
        }

        .avatar-container {
            width: 100%; height: 100%;
            border-radius: 50%;
            padding: 3px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 5;
            overflow: hidden;
        }

        .avatar-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        /* TAMAÑO ORIGINAL DEL NOMBRE (42px) */
        .name-aloe {
            font-family: 'Cinzel Decorative', serif;
            font-size: 42px; 
            color: #ffb7c5; 
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            line-height: 1;
            z-index: 2;
        }

        .flag-icon { width: 28px; height: auto; } /* Tamaño original */

        .hidden { display: none !important; }

        .phrase-container {
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 15px;
            text-align: center;
        }

        .book-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px;
            line-height: 1.4;
            color: #ffffff;
            font-style: italic;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        /* --- REPRODUCTOR CON CORAZONES (MEJORADO) --- */
        .music-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            margin-top: 10px;
        }

        /* Capa Trasera: Corazones Rosados (Saliendo del contorno) */
        .pink-hearts-back {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%; /* Más grande para que desborden */
            z-index: 1;
            pointer-events: none;
            overflow: visible; /* Clave para que se vean fuera */
        }

        .video-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ffb7c5;
            box-shadow: 0 0 25px rgba(255, 183, 197, 0.5); /* Más brillo */
        }

        /* Capa Delantera: Corazones Rojos */
        .red-hearts-front {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Animaciones de corazones */
        .burst-heart {
            position: absolute;
            pointer-events: none;
            top: 50%; left: 50%;
            animation: burstOut 2.8s ease-out forwards;
            opacity: 0;
            font-size: 20px;
        }

        @keyframes burstOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(var(--scale)); opacity: 0; }
        }

        .sprout-heart {
            position: absolute;
            color: #ffb7c5;
            pointer-events: none;
            z-index: 1;
            font-size: 15px;
            animation: sproutUp 3s ease-out forwards;
            opacity: 0;
        }

        @keyframes sproutUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: var(--translateSprout) scale(1.2); opacity: 0; }
        }

        @media (max-width: 500px) {
            .name-aloe { font-size: 30px; }
            .avatar-wrapper { width: 90px; height: 90px; }
            .glass-panel { padding-top: 55px; }
            .flag-icon { width: 22px; }
        }
    </style>
</head>
<body onclick="handleFirstClick()">

    <div class="bg-photos"></div>
    <div class="heart-container" id="heart-container"></div>

    <div class="glass-panel">
        <i class="fas fa-music corner-btn" id="btn-music" onclick="showMusic()"></i>
        <i class="fas fa-undo-alt corner-btn hidden" id="btn-back" onclick="showPhrase()"></i>

        <div class="header-flex">
            <div class="avatar-wrapper" id="avatar-box">
                <div class="avatar-container">
                    <img src="https://xatimg.com/image/xRlScAWo3KgI.gif" alt="Aloe">
                </div>
            </div>
            
            <div class="user-info" id="name-box">
                <h1 class="name-aloe">ALOE</h1>
                <img src="https://xatimg.com/image/VzoFcoKcIfhN.png" class="flag-icon" alt="ESPAÑA">
            </div>
        </div>

        <div id="phrase-content" class="phrase-container">
            <p class="book-text" style="font-weight: bold; margin-bottom: 10px; text-transform: uppercase;">
                LOS ENEMIGOS QUE SE VUELVEN TUS FANS
            </p>
            <p class="book-text">
                Cuando a una persona le caes mal se alía con otra para estar en contra de ti... <br><br>
                A decir verdad ni entre ellos se SOPORTAN pero se juntaron solamente por causa de ti. <br><br>
                <strong>¿Ya viste lo poderosos que llegamos a ser?</strong> <br>
                <strong style="font-size: 1.1em;">JAJAJAJAJAJAJA...</strong>
            </p>
        </div>

        <div id="music-content" class="hidden">
            <div class="music-wrapper">
                <div class="pink-hearts-back" id="pink-hearts"></div>
                
                <div class="video-box">
                    <iframe id="yt-player" src="https://www.youtube.com/embed/pJ-2ERdB1xE?enablejsapi=1&autoplay=0&loop=1&playlist=pJ-2ERdB1xE" allow="autoplay; encrypted-media"></iframe>
                </div>

                <div class="red-hearts-front" id="red-hearts"></div>
            </div>
        </div>
    </div>

    <script>
        let started = false;

        function handleFirstClick() {
            if (!started) {
                const player = document.getElementById('yt-player');
                player.src += "&autoplay=1";
                started = true;
            }
        }

        function showMusic() {
            document.getElementById('phrase-content').classList.add('hidden');
            document.getElementById('btn-music').classList.add('hidden');
            document.getElementById('music-content').classList.remove('hidden');
            document.getElementById('btn-back').classList.remove('hidden');
        }

        function showPhrase() {
            document.getElementById('music-content').classList.add('hidden');
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('phrase-content').classList.remove('hidden');
            document.getElementById('btn-music').classList.remove('hidden');
        }

        // Generador de corazones para el video (MEJORADO)
        setInterval(() => {
            if(!document.getElementById('music-content').classList.contains('hidden')){
                // Corazón Rojo (Frente) - Movimiento estándar
                createBurstHeart('red-hearts', '#ff0000', 1.3, 300, 200);
                
                // Corazón Rosado (Atrás) - Movimiento más amplio para desbordar
                createBurstHeart('pink-hearts', '#ffb7c5', 1.6, 450, 300); 
                createBurstHeart('pink-hearts', '#ffb7c5', 1.6, 450, 300); // Doble frecuencia atrás
            }
        }, 350);

        function createBurstHeart(containerId, color, scale, rangeX, rangeY) {
            const container = document.getElementById(containerId);
            const heart = document.createElement('div');
            heart.classList.add('burst-heart');
            heart.innerHTML = '❤';
            heart.style.color = color;
            
            // Efecto neón más fuerte para los de atrás
            if(color === '#ffb7c5') {
                heart.style.textShadow = '0 0 10px #ffb7c5, 0 0 20px #ffb7c5';
            }
            
            // Movimiento aleatorio amplio
            const tx = (Math.random() - 0.5) * rangeX + 'px';
            const ty = (Math.random() - 0.5) * rangeY + 'px';
            heart.style.setProperty('--tx', tx);
            heart.style.setProperty('--ty', ty);
            heart.style.setProperty('--scale', scale);
            
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 2800);
        }

        // Corazones nombre y lluvia fondo (igual que antes)
        setInterval(() => {
            const wrap = document.getElementById('name-box');
            if(wrap){
                const heart = document.createElement('div');
                heart.classList.add('sprout-heart');
                heart.innerHTML = '❤';
                heart.style.left = (Math.random() * 60 + 20) + '%';
                heart.style.top = (Math.random() * 50 + 20) + '%';
                const tx = (Math.random() - 0.5) * 80 + 'px'; 
                const ty = (Math.random() * -60 - 40) + 'px'; 
                heart.style.setProperty('--translateSprout', `translate(${tx}, ${ty})`);
                wrap.appendChild(heart);
                setTimeout(() => heart.remove(), 3000);
            }
        }, 600);

        setInterval(() => {
            const container = document.getElementById('heart-container');
            if(container){
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤';
                heart.style.left = Math.random() * 100 + 'vw';
                const duration = Math.random() * 5 + 5;
                heart.style.animationDuration = duration + 's';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), duration * 1000);
            }
        }, 450);
    </script>
</body>
</html>
