<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatiana | xatspace</title>
    <link rel="SHORTCUT ICON" href="https://xatimg.com/image/K0omsEWnsHvq.gif">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black; /* Fondo negro absoluto */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* La imagen se amolda para verse completa siempre */
        #imagen-central {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Esto fuerza a que se vea completa y no se recorte */
            z-index: 1;
            position: relative;
        }

        /* Los corazones por encima */
        #heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .heart {
            position: absolute;
            top: -50px;
            animation: fall linear forwards;
            font-size: 20px;
            user-select: none;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }
    </style>
</head>
<body onclick="playMusic()">

    <!-- Fondo negro (es el body) y la imagen centrada encima -->
    <img id="imagen-central" src="https://xatimg.com/image/tzQ8VhtkS50E.png" alt="Portfolio Image">

    <!-- Capa de corazones -->
    <div id="heart-container"></div>

    <!-- Música -->
    <audio id="musica" loop>
        <source src="https://xatspace.github.io/space/music/KarolG-SiAntesTeHubieraConocido.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playMusic() {
            const audio = document.getElementById("musica");
            if (audio.paused) {
                audio.play();
            }
        }

        const colors = ['#FF0000', '#0033A0', '#FFD700'];
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('heart-container').appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 7000);
        }
        
        setInterval(createHeart, 400);
    </script>
</body>
</html>
