<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatiana | xatspace | ZenBeat</title>
    <link rel="SHORTCUT ICON" href="https://xatimg.com/image/K0omsEWnsHvq.gif">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .lateral {
            position: fixed; top: 0; width: 30%; min-width: 250px; height: 100%; 
            z-index: 0; pointer-events: none;
            opacity: 0.8;
        }

        .izq { 
            left: 0; 
            background: linear-gradient(to bottom, #FFD700 50%, #0033A0 50%, #0033A0 75%, #FF0000 75%, #FF0000 100%);
            mask-image: linear-gradient(to right, black 20%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 20%, transparent 100%);
        }
        
        .der { 
            right: 0; 
            background: linear-gradient(to bottom, #FFD700 50%, #0033A0 50%, #0033A0 75%, #FF0000 75%, #FF0000 100%);
            mask-image: linear-gradient(to left, black 20%, transparent 100%);
            -webkit-mask-image: linear-gradient(to left, black 20%, transparent 100%);
        }

        #imagen-central {
            max-width: 100%; max-height: 100%;
            object-fit: contain; z-index: 1; position: relative;
        }

        #heart-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }

        .heart {
            position: absolute; top: -50px; animation: fall linear forwards;
            font-size: 20px; user-select: none;
        }

        @keyframes fall { to { transform: translateY(100vh); } }

        /* --- CSS PARA MÓVIL: OCULTAR FONDOS --- */
        @media only screen and (max-width: 768px) {
            .lateral {
                display: none !important;
            }
        }
    </style>
</head>
<body onclick="playMusic()">

    <div class="lateral izq"></div>
    <div class="lateral der"></div>

    <img id="imagen-central" src="https://xatimg.com/image/d78SqkKHPDC0.jpg" alt="Portfolio Image">
    <div id="heart-container"></div>

    <audio id="musica" loop>
        <source src="https://xatspace.github.io/space/music/LuisSilvaYeisonJimenezComoNoVoyaDecirlo.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playMusic() {
            const audio = document.getElementById("musica");
            if (audio.paused) { audio.play(); }
        }

        const colors = ['#FF0000', '#0033A0', '#FFD700'];
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('heart-container').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
