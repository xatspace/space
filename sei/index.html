<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sei XatSpace | Lucas</title>
    <link rel="SHORTCUT ICON" href="https://xatimg.com/image/K0omsEWnsHvq.gif">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght=1,600&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: linear-gradient(135deg, #1a0a1a 0%, #3d1a3d 35%, #5e2a5e 60%, #2e0a2e 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FOTOS DE FONDO */
        .bg-photos {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-photo-left {
            position: absolute;
            top: 0; left: 0; width: 50%; height: 100%;
            background-image: url('');
            background-repeat: no-repeat;
            background-position: left center;
            background-size: contain;
        }

        .bg-photo-right {
            position: absolute;
            top: 0; right: 0; width: 50%; height: 100%;
            background-image: url('');
            background-repeat: no-repeat;
            background-position: right center;
            background-size: contain;
        }

        /* LLUVIA DE CORAZONES */
        .heart-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .heart {
            position: absolute;
            color: #ffb6c1;
            font-size: 20px;
            animation: fall linear infinite;
            opacity: 0;
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { top: 100%; transform: translateX(50px) rotate(360deg); opacity: 0; }
        }

        /* PANEL CENTRAL */
        .glass-panel {
            background: rgba(0, 0, 0, 0.65);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 192, 203, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* BOTONES DE CAMBIO */
        .panel-btn {
            position: absolute;
            top: 20px;
            font-size: 20px;
            color: #ffb6c1;
            cursor: pointer;
            transition: 0.3s;
            z-index: 15;
            text-shadow: 0 0 10px #ffb6c1;
        }

        .btn-camera { left: 25px; }
        .btn-back { right: 25px; display: none; }
        .panel-btn:hover { color: #fff; transform: scale(1.2); }

        .name-wave {
            font-family: 'Cinzel Decorative', serif;
            font-size: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            background-image: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ee9ca7, #ff9a9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 4px 8px rgba(0, 0, 0, 0.6);
            margin-bottom: 15px;
        }

        /* CONTENEDOR MULTIMEDIA */
        .media-box {
            position: relative;
            width: 228px;
            height: 400px;
            margin: 20px auto;
        }

        .content-wrap {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 15px;
            padding: 5px;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px #ffb6c1;
            border: 2px solid #ffb6c1;
            overflow: hidden;
            transition: opacity 0.5s ease;
        }

        #slider-container { opacity: 0; pointer-events: none; }
        .slides {
            display: flex;
            width: 100%; height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        .slide-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            z-index: 20;
            border-radius: 5px;
        }
        .arrow-prev { left: 10px; }
        .arrow-next { right: 10px; }

        #gif-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        .red-heart-burst {
            position: absolute;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            z-index: 2;
            pointer-events: none;
            font-size: 26px;
            top: 50%; left: 50%;
            animation: burstOut 2.5s ease-out forwards;
        }

        @keyframes burstOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }

        .inspirational-phrase {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-style: italic;
            color: #ffffff;
            margin-top: 15px;
            text-shadow: 2px 2px 4px #000;
        }

        /* --- REPRODUCTOR CORREGIDO (FIJO) --- */
        .audio-controls {
            position: fixed; /* Esto lo deja clavado en la pantalla */
            bottom: 30px;    /* Distancia desde abajo */
            left: 50%;       /* Al centro */
            transform: translateX(-50%); /* Ajuste para centrado perfecto */
            z-index: 9999;   /* Por encima de todo */
        }

        .audio-btn {
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 182, 193, 0.6);
            color: #ffb6c1;
            cursor: pointer;
            font-size: 16px; /* Más chico */
            width: 40px;      /* Más chico */
            height: 40px;     /* Más chico */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .audio-btn:hover {
            transform: scale(1.1);
            border-color: #ffb6c1;
        }

        @media (max-width: 800px) {
            .bg-photos { display: none; }
            .name-wave { font-size: 35px; }
            .media-box { width: 180px; height: 315px; }
        }
    </style>
</head>
<body onclick="handleFirstClick()">

    <div class="bg-photos">
        <div class="bg-photo-left"></div>
        <div class="bg-photo-right"></div>
    </div>

    <div class="heart-container" id="heart-container"></div>

    <div class="glass-panel">
        <i class="fas fa-camera panel-btn btn-camera" onclick="toggleView('slider')"></i>
        <i class="fas fa-reply panel-btn btn-back" id="btn-back" onclick="toggleView('gif')"></i>

        <h1 class="name-wave">SEIఌ</h1>
        
        <div class="media-box" id="media-box">
            <div class="content-wrap" id="gif-container">
                <img src="https://xatimg.com/image/nSNNLN9jrDPT.gif" alt="Sei GIF">
            </div>

            <div class="content-wrap" id="slider-container">
                <button class="slide-arrow arrow-prev" onclick="moveSlide(-1, event)">&#10094;</button>
                <div class="slides" id="slides">
                    <div class="slide"><img src="https://xatimg.com/image/Lt09OYxHagkT.png"></div>
                    <div class="slide"><img src="https://xatimg.com/image/uGiCmG3V5RiL.png"></div>
                    <div class="slide"><img src="https://xatimg.com/image/SyCTGo1LjptO.png"></div>
                    <div class="slide"><img src="https://xatimg.com/image/ABW7qMsTmjhM.png"></div>
                </div>
                <button class="slide-arrow arrow-next" onclick="moveSlide(1, event)">&#10095;</button>
            </div>
        </div>

        <p class="inspirational-phrase">"𝐄𝐫𝐞𝐬 𝐋𝐮𝐳 𝐄𝐧 𝐓𝐚𝐧𝐭𝐚 𝐎𝐬𝐜𝐮𝐫𝐢𝐝𝐚𝐝 🤍"</p>
    </div>

    <div class="audio-controls">
        <button class="audio-btn" onclick="togglePlay(event)">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
    </div>

    <audio id="main-audio" loop>
        <source src="https://xatspace.github.io/space/sei/CarlaMorrisonDisfruto.mp3" type="audio/mpeg">
    </audio>

    <script>
        function toggleView(view) {
            const gif = document.getElementById('gif-container');
            const slider = document.getElementById('slider-container');
            const btnCam = document.querySelector('.btn-camera');
            const btnBack = document.getElementById('btn-back');

            if (view === 'slider') {
                gif.style.opacity = '0';
                slider.style.opacity = '1';
                slider.style.pointerEvents = 'auto';
                btnCam.style.display = 'none';
                btnBack.style.display = 'block';
            } else {
                gif.style.opacity = '1';
                slider.style.opacity = '0';
                slider.style.pointerEvents = 'none';
                btnCam.style.display = 'block';
                btnBack.style.display = 'none';
            }
        }

        let currentSlide = 0;
        const totalSlides = 4;
        const slidesElement = document.getElementById('slides');

        function updateSlider() {
            slidesElement.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function moveSlide(step, e) {
            if(e) e.stopPropagation();
            currentSlide = (currentSlide + step + totalSlides) % totalSlides;
            updateSlider();
        }

        setInterval(() => {
            if (document.getElementById('slider-container').style.opacity === '1') {
                moveSlide(1);
            }
        }, 4000);

        setInterval(() => {
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 5 + 5;
            heart.style.animationDuration = duration + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), duration * 1000);
        }, 300);

        setInterval(() => {
            const wrap = document.getElementById('media-box');
            const heart = document.createElement('div');
            heart.classList.add('red-heart-burst');
            heart.innerHTML = '❤';
            const tx = (Math.random() - 0.5) * 450 + 'px';
            const ty = (Math.random() - 0.5) * 650 + 'px';
            heart.style.setProperty('--tx', tx);
            heart.style.setProperty('--ty', ty);
            wrap.insertBefore(heart, wrap.firstChild);
            setTimeout(() => heart.remove(), 2500);
        }, 250);

        const audio = document.getElementById('main-audio');
        const playIcon = document.getElementById('play-icon');
        let interactionDone = false;

        function handleFirstClick() {
            if (!interactionDone) {
                audio.play();
                interactionDone = true;
                updateIcons();
            }
        }

        function togglePlay(e) {
            e.stopPropagation();
            if (audio.paused) audio.play(); else audio.pause();
            updateIcons();
        }

        function updateIcons() {
            playIcon.className = audio.paused ? "fas fa-play" : "fas fa-pause";
        }
    </script>
</body>
</html>
